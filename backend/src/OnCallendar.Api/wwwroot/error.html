<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>OnCallendar — Errore</title>
  <link rel="icon" type="image/png" href="/favicon.png" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      background: #F7F8F0;
      color: #355872;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 1.5rem;
    }
    .card {
      background: #fff;
      border-radius: 1rem;
      box-shadow: 0 4px 24px rgba(53,88,114,.12);
      max-width: 420px;
      width: 100%;
      text-align: center;
      padding: 2.5rem 2rem;
    }
    .card img {
      width: 180px;
      height: auto;
      margin-bottom: 1.5rem;
    }
    .code {
      font-size: 3.5rem;
      font-weight: 800;
      color: #C0413B;
      line-height: 1;
    }
    .message {
      font-size: 1.15rem;
      margin-top: .75rem;
      color: #5A7689;
      line-height: 1.5;
    }
    .back {
      display: inline-block;
      margin-top: 1.5rem;
      padding: .65rem 1.5rem;
      background: #355872;
      color: #fff;
      border-radius: .5rem;
      text-decoration: none;
      font-weight: 600;
      transition: background .2s;
    }
    .back:hover { background: #7AAACE; }
  </style>
</head>
<body>
  <div class="card">
    <img src="/errore.png" alt="Errore" />
    <div class="code">{{STATUS_CODE}}</div>
    <p class="message">Qualcosa è andato storto.<br/>Riprova tra qualche istante.</p>
    <a class="back" href="/">Torna alla home</a>
  </div>
</body>
</html>
